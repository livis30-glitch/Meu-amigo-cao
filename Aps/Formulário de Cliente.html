<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cliente</title>
</head>
<body>

    <p><a href="Home.html">Home</a></p>
    <h2>Informações Pessoais</h2>

    <fieldset>
        <legend>Cadastro do Cliente</legend>
            <label>Nome:</label>
            <input type="text" size="70" maxlength="150" placeholder="Digite o nome do cliente"><br>
            <br>
            <label>Idade:</label>
            <input type="number" size="20" maxlength="150" placeholder="Digite a idade"><br>
            <br>
            <label>Endereço:</label><br>
            <input type="text" size="100" maxlength="150" placeholder="Digite o endereço"><br>
            <br>
            <label>Cidade:</label>
            <input type="text" size="70" maxlength="150" placeholder="Digite a cidade"><br>
            <br>
            <label>Estado:</label>
            <input type="text" size="8" maxlength="150" placeholder="UF"><br>
            <br>
            <label>CEP:</label>
            <input type="text" size="15" maxlength="150" placeholder="XXXXX-XXX"><br>
            <br>
            <label>Tel/Res:</label>
            <input type="number" size="15" maxlength="150" placeholder="99 99999-9999"><br>
            <br>
            <label>Tel/Cel:</label>
            <input type="number" size="15" maxlength="150" placeholder="99 99999-9999"><br>
            <br>
            <label>Email:</label><br>
            <input type="text" size="70" maxlength="150" placeholder="Digite o endereço de email"><br>
            <br>
    </fieldset>
        <br><input type="submit" value="Enviar">

</body>
</html>
